version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "maintenance/dependencies"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "maintenance/dependencies"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      python-dependencies:
        patterns:
          - "*"